version: 2

models:
  - name: dim_products
    description: "One row per product with English category name."
    semantic_model:
      enabled: true
      name: products
    columns:
      - name: product_id
        data_tests: [unique, not_null]
        entity:
          type: primary
      - name: product_category
        dimension:
          type: categorical
      - name: product_category_name
        dimension:
          type: categorical