version: 2

models:
  - name: fct_orders
    description: "One row per order with payment totals, review scores, and delivery metrics."
    semantic_model:
      enabled: true
      name: orders
    columns:
      - name: order_id
        data_tests: [unique, not_null]
        entity:
          type: primary
      - name: customer_id
        data_tests: [not_null]
        entity:
          name: customer
          type: foreign
      - name: purchased_at
        granularity: day
        dimension:
          type: time
      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values: ['delivered','shipped','canceled','unavailable',
                         'invoiced','processing','created','approved']
        dimension:
          type: categorical
      - name: delivery_days
    metrics:
      - name: order_count
        label: Order Count
        description: "Total number of orders"
        type: simple
        agg: count_distinct
        expr: order_id
      - name: avg_delivery_days
        label: Avg Delivery Days
        description: "Average days to deliver an order"
        type: simple
        agg: average
        expr: delivery_days