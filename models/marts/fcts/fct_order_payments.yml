version: 2

models:
  - name: fct_order_payments
    description: "One row per payment transaction linked to an order."
    semantic_model:
      enabled: true
      name: order_payments
    columns:
      - name: payment_sequential
        entity:
          name: payment
          type: primary
      - name: order_id
        data_tests: [not_null]
        entity:
          name: order
          type: foreign
      - name: purchased_at
        granularity: day
        dimension:
          type: time
      - name: payment_type
        data_tests:
          - accepted_values:
              arguments:
                values: ['credit_card','boleto','voucher','debit_card','not_defined']
        dimension:
          type: categorical
      - name: payment_value
        data_tests: [not_null]
      - name: payment_installments
    metrics:
      - name: total_revenue
        label: Total Revenue
        description: "Total GMV from all payments"
        type: simple
        agg: sum
        expr: payment_value
      - name: total_orders
        label: Total Orders
        description: "Count of distinct orders"
        type: simple
        agg: count_distinct
        expr: order_id
      - name: total_installments
        label: Total Installments
        description: "Total installments across all payments"
        type: simple
        agg: sum
        expr: payment_installments

metrics:
  - name: average_order_value
    label: Average Order Value
    description: "Average revenue per order"
    type: ratio
    numerator: total_revenue
    denominator: total_orders
  - name: average_installments
    label: Avg Installments per Order
    description: "Average installments per order"
    type: ratio
    numerator: total_installments
    denominator: total_orders